name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node

      - name: Assign release PRs
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/github-script@v7
        env:
          RELEASE_PRS: ${{ steps.release.outputs.prs }}
          ASSIGNEE: ElianCodes
        with:
          script: |
            const prs = JSON.parse(process.env.RELEASE_PRS || '[]');
            for (const pr of prs) {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                assignees: [process.env.ASSIGNEE],
              });
            }

  publish:
    name: Publish to npm
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    outputs:
      published_version: ${{ steps.package-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Read package version
        id: package-version
        run: node -p "'version=' + require('./package.json').version" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  open-upgrade-prs:
    name: Open dependency upgrade PRs
    needs: [release-please, publish]
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - Get-Coral/aurora
          - Get-Coral/KAPOW
          - Get-Coral/librarian
          - Get-Coral/fathom
          - Get-Coral/template
          - Get-Coral/marquee
          - Get-Coral/encore
    steps:
      - name: Check automation token
        id: token-check
        run: |
          if [ -n "${{ secrets.CORAL_AUTOMATION_TOKEN }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip notice when token is unavailable
        if: steps.token-check.outputs.available != 'true'
        run: echo "Skipping dependency upgrade PR for ${{ matrix.repo }} because CORAL_AUTOMATION_TOKEN is not configured."

      - name: Check out dependent repo
        if: steps.token-check.outputs.available == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          ref: main
          token: ${{ secrets.CORAL_AUTOMATION_TOKEN }}
          path: repo

      - uses: pnpm/action-setup@v4
        if: steps.token-check.outputs.available == 'true'
        with:
          version: 10

      - uses: actions/setup-node@v4
        if: steps.token-check.outputs.available == 'true'
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: repo/pnpm-lock.yaml

      - name: Update Jellyfin dependency
        if: steps.token-check.outputs.available == 'true'
        working-directory: repo
        env:
          JELLYFIN_VERSION: ${{ needs.publish.outputs.published_version }}
        run: |
          pnpm add @get-coral/jellyfin@^${JELLYFIN_VERSION}

      - name: Create pull request
        if: steps.token-check.outputs.available == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.CORAL_AUTOMATION_TOKEN }}
          path: repo
          commit-message: "chore: bump @get-coral/jellyfin to ^${{ needs.publish.outputs.published_version }}"
          branch: "automation/jellyfin-v${{ needs.publish.outputs.published_version }}"
          delete-branch: true
          title: "chore: bump @get-coral/jellyfin to ^${{ needs.publish.outputs.published_version }}"
          body: |
            This PR was opened automatically after releasing `@get-coral/jellyfin@${{ needs.publish.outputs.published_version }}`.

            It updates the shared Jellyfin client dependency and refreshes the pnpm lockfile.
